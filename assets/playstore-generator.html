<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Generador Capturas Play Store</title>
    <style>
        body {
            background: #f5f2e9;
            font-family: sans-serif;
            text-align: center;
            padding: 50px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        img {
            width: 100%;
            border: 1px solid #ddd;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            background: #4a9070;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #3a7559;
        }
    </style>
</head>

<body>
    <h1>Generador de Capturas (1080x1920)</h1>
    <p>Haz clic en el botón para generar y descargar mágicamente las 4 capturas necesarias para Google Play.</p>
    <button onclick="generar()">Descargar las 4 capturas</button>
    <div class="grid" id="preview"></div>

    <script>
        const imagenes = [
            { src: '/assets/screenshots/screen-home.png', text: 'Tu Oráculo Personal', name: '1_home' },
            { src: '/assets/screenshots/screen-reading.png', text: 'Sabiduría Milenaria', name: '2_reading' },
            { src: '/assets/screenshots/screen-wide.png', text: 'Reflexión Profunda', name: '3_desktop' },
            { src: '/assets/screenshots/screen-home.png', text: 'Paz Interior', name: '4_zen' }
        ];

        async function generar() {
            const preview = document.getElementById('preview');
            preview.innerHTML = '';

            for (const item of imagenes) {
                const canvas = document.createElement('canvas');
                canvas.width = 1080;
                canvas.height = 1920;
                const ctx = canvas.getContext('2d');

                // Fondo
                ctx.fillStyle = '#f5f2e9';
                ctx.fillRect(0, 0, 1080, 1920);

                // Texto
                ctx.fillStyle = '#4a9070';
                ctx.font = 'bold 70px system-ui, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(item.text, 540, 250);

                // Cargar imagen
                const img = new Image();
                img.src = item.src;
                await new Promise((resolve) => {
                    img.onload = resolve;
                    img.onerror = resolve; // Ignorar errores pero avanzar
                });

                if (img.width > 0) {
                    const padX = 120;
                    const padY = 400; // Espacio para el texto arriba
                    const availW = 1080 - padX * 2;
                    const availH = 1920 - padY - 150;

                    // Escalar imagen manteniendo proporción
                    const scale = Math.min(availW / img.width, availH / img.height);
                    const drawW = img.width * scale;
                    const drawH = img.height * scale;
                    const drawX = (1080 - drawW) / 2;
                    const drawY = padY + (availH - drawH) / 2;

                    // Sombra elegante
                    ctx.shadowColor = 'rgba(0, 0, 0, 0.15)';
                    ctx.shadowBlur = 50;
                    ctx.shadowOffsetY = 20;

                    ctx.drawImage(img, drawX, drawY, drawW, drawH);
                }

                // Mostrar previsualización
                const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
                const imgPreview = document.createElement('img');
                imgPreview.src = dataUrl;
                preview.appendChild(imgPreview);

                // Forzar descarga
                const link = document.createElement('a');
                link.download = item.name + '.jpg';
                link.href = dataUrl;
                link.click();

                // Pequeña pausa para no saturar el navegador
                await new Promise(r => setTimeout(r, 500));
            }
        }
    </script>
</body>

</html>
