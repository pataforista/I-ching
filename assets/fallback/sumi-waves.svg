<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="ocean-sky" cx="50%" cy="25%" r="80%">
      <stop offset="0%" stop-color="hsl(210,22%,90%)"/>
      <stop offset="100%" stop-color="hsl(38,20%,85%)"/>
    </radialGradient>
    <filter id="wave-blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="mist">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Sky / paper -->
  <rect width="1200" height="800" fill="url(#ocean-sky)"/>

  <!-- Distant horizon haze -->
  <rect x="0" y="340" width="1200" height="60" fill="hsl(210,18%,92%)" filter="url(#mist)" opacity="0.6"/>

  <!-- Ocean body -->
  <rect x="0" y="380" width="1200" height="420" fill="hsl(215,20%,72%)" opacity="0.25"/>

  <!-- Wave layers — back to front, lighter to darker ink -->

  <!-- Far waves (lightest) -->
  <g opacity="0.22">
    <path d="M0,420 Q60,400 120,420 Q180,440 240,420 Q300,400 360,420 Q420,440 480,420 Q540,400 600,420 Q660,440 720,420 Q780,400 840,420 Q900,440 960,420 Q1020,400 1080,420 Q1140,440 1200,420"
          fill="none" stroke="hsl(220,15%,30%)" stroke-width="3" stroke-linecap="round" filter="url(#wave-blur)"/>
    <path d="M0,445 Q80,428 160,445 Q240,462 320,445 Q400,428 480,445 Q560,462 640,445 Q720,428 800,445 Q880,462 960,445 Q1040,428 1120,445 Q1160,452 1200,445"
          fill="none" stroke="hsl(220,15%,30%)" stroke-width="2.5" stroke-linecap="round" filter="url(#wave-blur)"/>
  </g>

  <!-- Mid waves -->
  <g opacity="0.40">
    <path d="M0,500 Q70,478 140,500 Q210,522 280,500 Q350,478 420,500 Q490,522 560,500 Q630,478 700,500 Q770,522 840,500 Q910,478 980,500 Q1050,522 1120,500 Q1160,510 1200,500"
          fill="none" stroke="hsl(220,16%,28%)" stroke-width="4" stroke-linecap="round"/>
    <path d="M0,530 Q90,508 180,530 Q270,552 360,530 Q450,508 540,530 Q630,552 720,530 Q810,508 900,530 Q990,552 1080,530 Q1140,540 1200,530"
          fill="none" stroke="hsl(220,16%,28%)" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Near waves — bolder ink strokes -->
  <g opacity="0.65">
    <path d="M0,600 Q80,572 160,600 Q240,628 320,600 Q400,572 480,600 Q560,628 640,600 Q720,572 800,600 Q880,628 960,600 Q1040,572 1120,600 Q1160,614 1200,600"
          fill="none" stroke="hsl(222,18%,22%)" stroke-width="5.5" stroke-linecap="round"/>
    <!-- Foam crest (thicker top of wave) -->
    <path d="M0,592 Q40,578 80,592 Q120,606 160,592 Q200,578 240,592"
          fill="none" stroke="hsl(222,18%,22%)" stroke-width="3" stroke-linecap="round"/>
    <path d="M480,592 Q520,578 560,592 Q600,606 640,592 Q680,578 720,592"
          fill="none" stroke="hsl(222,18%,22%)" stroke-width="3" stroke-linecap="round"/>
    <path d="M900,588 Q950,574 1000,588 Q1050,602 1100,588"
          fill="none" stroke="hsl(222,18%,22%)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Foreground waves — darkest, most expressive ink -->
  <g opacity="0.82">
    <path d="M0,700 Q100,662 200,700 Q300,738 400,700 Q500,662 600,700 Q700,738 800,700 Q900,662 1000,700 Q1100,738 1200,700"
          fill="none" stroke="hsl(224,20%,18%)" stroke-width="7" stroke-linecap="round"/>
    <!-- Spray dots -->
    <circle cx="200" cy="686" r="5" fill="hsl(224,20%,18%)" opacity="0.6"/>
    <circle cx="212" cy="678" r="3" fill="hsl(224,20%,18%)" opacity="0.5"/>
    <circle cx="600" cy="684" r="4" fill="hsl(224,20%,18%)" opacity="0.6"/>
    <circle cx="1000" cy="686" r="5" fill="hsl(224,20%,18%)" opacity="0.6"/>
    <circle cx="1012" cy="676" r="3" fill="hsl(224,20%,18%)" opacity="0.4"/>
  </g>

  <!-- Bottom dark band -->
  <rect x="0" y="760" width="1200" height="40" fill="hsl(224,20%,18%)" opacity="0.3"/>
</svg>
