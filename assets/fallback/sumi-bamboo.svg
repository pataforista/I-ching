<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="ink-blur">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
    <radialGradient id="paper-bg" cx="40%" cy="35%" r="80%">
      <stop offset="0%" stop-color="hsl(42,28%,95%)"/>
      <stop offset="100%" stop-color="hsl(38,22%,88%)"/>
    </radialGradient>
    <filter id="soft-edge">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Warm paper background -->
  <rect width="1200" height="800" fill="url(#paper-bg)"/>

  <!-- Ink wash background tone (very subtle) -->
  <ellipse cx="800" cy="400" rx="500" ry="350" fill="hsl(40,15%,85%)" opacity="0.4" filter="url(#soft-edge)"/>

  <!-- Bamboo stalks — far background (lighter) -->
  <!-- Stalk 1 -->
  <rect x="790" y="0" width="9" height="800" rx="4" fill="hsl(140,14%,48%)" opacity="0.22" filter="url(#soft-edge)"/>
  <!-- Stalk 2 -->
  <rect x="850" y="100" width="7" height="700" rx="3" fill="hsl(140,12%,45%)" opacity="0.18" filter="url(#soft-edge)"/>
  <!-- Stalk 3 -->
  <rect x="920" y="0" width="10" height="800" rx="4" fill="hsl(140,14%,42%)" opacity="0.20" filter="url(#soft-edge)"/>

  <!-- Bamboo stalks — mid layer -->
  <!-- Stalk A -->
  <g transform="translate(350,0)" opacity="0.55">
    <!-- Node segments -->
    <rect x="0" y="80" width="14" height="200" rx="6" fill="hsl(145,16%,32%)"/>
    <ellipse cx="7" cy="280" rx="9" ry="5" fill="hsl(145,16%,24%)"/>
    <rect x="0" y="285" width="14" height="180" rx="6" fill="hsl(145,16%,34%)"/>
    <ellipse cx="7" cy="465" rx="9" ry="5" fill="hsl(145,16%,24%)"/>
    <rect x="0" y="470" width="14" height="200" rx="6" fill="hsl(145,16%,32%)"/>
    <ellipse cx="7" cy="670" rx="9" ry="5" fill="hsl(145,16%,24%)"/>
    <rect x="0" y="675" width="14" height="130" rx="6" fill="hsl(145,16%,32%)"/>
  </g>
  <!-- Stalk B -->
  <g transform="translate(470,140)" opacity="0.45">
    <rect x="0" y="0" width="11" height="170" rx="5" fill="hsl(145,15%,38%)"/>
    <ellipse cx="5.5" cy="170" rx="7" ry="4" fill="hsl(145,15%,28%)"/>
    <rect x="0" y="175" width="11" height="200" rx="5" fill="hsl(145,15%,36%)"/>
    <ellipse cx="5.5" cy="375" rx="7" ry="4" fill="hsl(145,15%,28%)"/>
    <rect x="0" y="380" width="11" height="285" rx="5" fill="hsl(145,15%,38%)"/>
  </g>

  <!-- Bamboo stalks — foreground (darkest ink) -->
  <g transform="translate(80,0)" opacity="0.85">
    <rect x="0" y="0" width="18" height="190" rx="7" fill="hsl(150,16%,22%)"/>
    <ellipse cx="9" cy="190" rx="12" ry="6" fill="hsl(150,18%,14%)"/>
    <rect x="0" y="196" width="18" height="210" rx="7" fill="hsl(150,16%,24%)"/>
    <ellipse cx="9" cy="406" rx="12" ry="6" fill="hsl(150,18%,14%)"/>
    <rect x="0" y="412" width="18" height="240" rx="7" fill="hsl(150,16%,22%)"/>
    <ellipse cx="9" cy="652" rx="12" ry="6" fill="hsl(150,18%,14%)"/>
    <rect x="0" y="658" width="18" height="150" rx="7" fill="hsl(150,16%,22%)"/>

    <!-- Leaves at nodes -->
    <path d="M9,190 Q60,140 90,155 Q55,175 9,200" fill="hsl(150,18%,22%)" opacity="0.7"/>
    <path d="M9,406 Q-40,360 -60,380 Q-30,395 9,415" fill="hsl(150,18%,22%)" opacity="0.65"/>
    <path d="M9,406 Q70,370 85,385 Q50,400 9,412" fill="hsl(150,18%,22%)" opacity="0.6"/>
  </g>

  <!-- Second foreground stalk -->
  <g transform="translate(180,60)" opacity="0.7">
    <rect x="0" y="0" width="13" height="160" rx="6" fill="hsl(148,15%,26%)"/>
    <ellipse cx="6.5" cy="160" rx="9" ry="5" fill="hsl(148,16%,18%)"/>
    <rect x="0" y="166" width="13" height="190" rx="6" fill="hsl(148,15%,28%)"/>
    <ellipse cx="6.5" cy="356" rx="9" ry="5" fill="hsl(148,16%,18%)"/>
    <path d="M6,356 Q55,315 72,332 Q40,348 6,362" fill="hsl(148,16%,24%)" opacity="0.7"/>
    <rect x="0" y="362" width="13" height="440" rx="6" fill="hsl(148,15%,26%)"/>
  </g>

  <!-- Scattered ink dots (texture) -->
  <g opacity="0.12" filter="url(#ink-blur)">
    <circle cx="600" cy="200" r="80" fill="hsl(145,12%,35%)"/>
    <circle cx="900" cy="600" r="60" fill="hsl(145,12%,35%)"/>
    <circle cx="200" cy="700" r="50" fill="hsl(145,12%,35%)"/>
  </g>
</svg>
