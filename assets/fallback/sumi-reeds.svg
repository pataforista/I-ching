<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="sky-paper" cx="60%" cy="30%" r="75%">
      <stop offset="0%" stop-color="hsl(210,18%,93%)"/>
      <stop offset="100%" stop-color="hsl(38,22%,87%)"/>
    </radialGradient>
    <filter id="reed-blur">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
    <filter id="mist-far">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <!-- Paper / sky -->
  <rect width="1200" height="800" fill="url(#sky-paper)"/>

  <!-- Distant mist band over water -->
  <ellipse cx="600" cy="540" rx="750" ry="80" fill="hsl(210,14%,94%)" filter="url(#mist-far)" opacity="0.55"/>

  <!-- Water surface (bottom half) -->
  <rect x="0" y="560" width="1200" height="240" fill="hsl(210,16%,74%)" opacity="0.20"/>

  <!-- Water ripples -->
  <g opacity="0.18">
    <path d="M0,590 Q100,582 200,590 Q300,598 400,590 Q500,582 600,590 Q700,598 800,590 Q900,582 1000,590 Q1100,598 1200,590"
          fill="none" stroke="hsl(218,16%,40%)" stroke-width="1.8"/>
    <path d="M0,620 Q120,612 240,620 Q360,628 480,620 Q600,612 720,620 Q840,628 960,620 Q1080,612 1200,620"
          fill="none" stroke="hsl(218,16%,40%)" stroke-width="1.5"/>
    <path d="M0,650 Q150,640 300,650 Q450,660 600,650 Q750,640 900,650 Q1050,660 1200,650"
          fill="none" stroke="hsl(218,16%,40%)" stroke-width="1.3"/>
  </g>

  <!-- Reed stalks — background group (lighter, blurred) -->
  <g opacity="0.30" filter="url(#mist-far)">
    <line x1="820" y1="300" x2="815" y2="760" stroke="hsl(40,18%,38%)" stroke-width="5" stroke-linecap="round"/>
    <line x1="870" y1="280" x2="864" y2="760" stroke="hsl(40,18%,38%)" stroke-width="4" stroke-linecap="round"/>
    <line x1="950" y1="310" x2="946" y2="760" stroke="hsl(40,18%,38%)" stroke-width="5" stroke-linecap="round"/>
    <line x1="1020" y1="290" x2="1015" y2="760" stroke="hsl(40,18%,38%)" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Reed stalks — mid layer -->
  <g opacity="0.55">
    <!-- Slightly bent reed lines -->
    <path d="M580,200 Q578,400 575,760" fill="none" stroke="hsl(38,20%,32%)" stroke-width="5" stroke-linecap="round"/>
    <path d="M620,240 Q618,440 615,760" fill="none" stroke="hsl(38,20%,32%)" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M660,220 Q658,420 654,760" fill="none" stroke="hsl(38,20%,32%)" stroke-width="5" stroke-linecap="round"/>
    <path d="M700,260 Q699,450 696,760" fill="none" stroke="hsl(38,20%,32%)" stroke-width="4" stroke-linecap="round"/>
    <!-- Reed seed heads -->
    <ellipse cx="580" cy="198" rx="7" ry="22" fill="hsl(35,22%,30%)" opacity="0.7"/>
    <ellipse cx="620" cy="238" rx="6" ry="18" fill="hsl(35,22%,30%)" opacity="0.7"/>
    <ellipse cx="660" cy="218" rx="7" ry="20" fill="hsl(35,22%,30%)" opacity="0.7"/>
    <ellipse cx="700" cy="258" rx="6" ry="17" fill="hsl(35,22%,30%)" opacity="0.7"/>
  </g>

  <!-- Reed stalks — foreground (darkest ink) -->
  <g opacity="0.88">
    <path d="M100,120 Q97,360 94,760" fill="none" stroke="hsl(36,18%,22%)" stroke-width="8" stroke-linecap="round"/>
    <path d="M155,160 Q152,400 148,760" fill="none" stroke="hsl(36,18%,22%)" stroke-width="7" stroke-linecap="round"/>
    <path d="M220,100 Q217,340 213,760" fill="none" stroke="hsl(36,18%,22%)" stroke-width="8" stroke-linecap="round"/>
    <path d="M285,145 Q283,380 279,760" fill="none" stroke="hsl(36,18%,22%)" stroke-width="6.5" stroke-linecap="round"/>
    <path d="M340,115 Q338,350 334,760" fill="none" stroke="hsl(36,18%,22%)" stroke-width="7.5" stroke-linecap="round"/>

    <!-- Seed heads (cattail / reed tops) -->
    <ellipse cx="100" cy="116" rx="10" ry="30" fill="hsl(34,20%,22%)"/>
    <ellipse cx="155" cy="157" rx="9" ry="26" fill="hsl(34,20%,22%)"/>
    <ellipse cx="220" cy="96" rx="10" ry="30" fill="hsl(34,20%,22%)"/>
    <ellipse cx="285" cy="142" rx="8" ry="24" fill="hsl(34,20%,22%)"/>
    <ellipse cx="340" cy="111" rx="10" ry="28" fill="hsl(34,20%,22%)"/>

    <!-- Leaf blades (diagonal strokes) -->
    <path d="M100,300 Q140,275 180,280" fill="none" stroke="hsl(36,18%,22%)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M155,350 Q115,330 85,340" fill="none" stroke="hsl(36,18%,22%)" stroke-width="3" stroke-linecap="round"/>
    <path d="M220,280 Q265,258 295,265" fill="none" stroke="hsl(36,18%,22%)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M340,250 Q300,232 270,242" fill="none" stroke="hsl(36,18%,22%)" stroke-width="3" stroke-linecap="round"/>
    <path d="M285,420 Q248,404 222,412" fill="none" stroke="hsl(36,18%,22%)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- A lone bird (simple ink brushstroke V) -->
  <path d="M820,180 Q838,168 856,180" fill="none" stroke="hsl(36,18%,22%)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M855,172 Q873,160 891,172" fill="none" stroke="hsl(36,18%,22%)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
</svg>
