<html lang="es" data-theme="paper">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f3efe4" />
  <title>I Ching — Reflexión local</title>

  <!-- Fuentes opcionales (puedes borrar esto si no quieres dependencias) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=Spectral:wght@400;600&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="./styles.css" />
</head>

<body>

  <body>
    <div class="paper">
      <header class="topbar">
        <div class="brand">
          <div class="seal">IC</div>
          <div class="vstack" style="gap:2px;">
            <div class="brand__title">I Ching</div>
            <div class="brand__subtitle">Reflexión local</div>
          </div>
        </div>
        <div class="toolbar">
          <button id="btnTheme" class="btn btn--ghost btn--sm" type="button">Tema</button>
          <button id="btnAbout" class="btn btn--ghost btn--sm" type="button">Acerca de</button>
        </div>
      </header>

      <main id="app" style="width:100%; max-width:var(--maxw); display:flex; flex-direction:column; gap:12px;"></main>

      <footer class="footer">
        <div id="footerText">Elaborado por Dr. César Celada (CACB). Uso personal. No sustituye criterio clínico.</div>
      </footer>
    </div>

    <dialog id="modal" class="modal">
      <div class="vstack">
        <h3 id="modalTitle" class="hexTitle" style="margin-top:0;">Título</h3>
        <div id="modalBody">Cuerpo del modal...</div>
        <div class="row" style="margin-top:20px; justify-content:flex-end;">
          <form method="dialog">
            <button class="btn btn--primary">Cerrar</button>
          </form>
        </div>
      </div>
    </dialog>

    <script type="module" src="./app.js"></script>
    <script>
      (function () {
        // Unificación de tema: iching_theme_v0 (ink | paper)
        const LS_THEME = "iching_theme_v0";
        const html = document.documentElement;

        const saved = localStorage.getItem(LS_THEME) || "ink";
        // Aplicar estado inicial
        html.setAttribute("data-theme", saved);
        updateMeta(saved);

        const btn = document.getElementById("btnTheme");
        btn?.addEventListener("click", () => {
          const current = html.getAttribute("data-theme") || "ink";
          const next = (current === "paper") ? "ink" : "paper";

          html.setAttribute("data-theme", next);
          localStorage.setItem(LS_THEME, next);
          updateMeta(next);
        });

        function updateMeta(themeName) {
          const meta = document.querySelector('meta[name="theme-color"]');
          // Ajusta estos colores según tu CSS real
          if (meta) meta.setAttribute("content", themeName === "ink" ? "#1a1a18" : "#f3efe4");
        }
      })();
    </script>
  </body>

</html>
